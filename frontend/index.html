<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUI: Ubuntu ZFS Installer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap');
        body { font-family: 'Ubuntu', sans-serif; background-color: #300a24; color: white; }
        .ubuntu-gradient { background: linear-gradient(135deg, #E95420 0%, #772953 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DiskCard = ({ disk, selected, onSelect }) => {
            const getIcon = () => {
                if (disk.is_virtual) return "fa-server";
                if (disk.transport === "nvme") return "fa-bolt";
                if (!disk.rotational) return "fa-memory"; // SSD
                return "fa-hard-drive"; // HDD
            };

            const getBadge = () => {
                if (disk.transport === "nvme") return { text: "NVMe", color: "bg-blue-600" };
                if (disk.is_virtual) return { text: "VIRTUAL", color: "bg-gray-600" };
                if (!disk.rotational) return { text: "SSD", color: "bg-green-600" };
                return { text: "HDD", color: "bg-yellow-700" };
            };

            const badge = getBadge();
            const osIcon = disk.os ? (disk.os.toLowerCase().includes("windows") ? "fa-windows" : "fa-linux") : null;

            return (
                <div 
                    onClick={() => onSelect(disk)}
                    className={`p-4 mb-4 rounded-lg border-2 transition-all cursor-pointer flex items-center justify-between ${
                        selected ? 'border-orange-500 bg-white/10 shadow-lg scale-[1.02]' : 'border-white/20 bg-black/20 hover:bg-black/40'
                    }`}
                >
                    <div class="flex items-center space-x-4">
                        <div class={`w-12 h-12 rounded-full flex items-center justify-center text-2xl ${selected ? 'text-orange-500' : 'text-white/60'}`}>
                            <i class={`fa-solid ${getIcon()}`}></i>
                        </div>
                        <div>
                            <div class="flex items-center space-x-2">
                                <span class="text-lg font-bold">{disk.name}</span>
                                <span class={`text-[10px] px-2 py-0.5 rounded font-bold uppercase ${badge.color}`}>{badge.text}</span>
                                {disk.os && (
                                    <span class="bg-purple-600 text-[10px] px-2 py-0.5 rounded font-bold uppercase flex items-center">
                                        <i class={`fa-brands ${osIcon} mr-1`}></i> {disk.os}
                                    </span>
                                )}
                            </div>
                            <div class="text-sm text-white/60 font-medium">
                                {disk.model} ({disk.size})
                            </div>
                        </div>
                    </div>
                    <div class="text-2xl">
                        <i class={`fa-circle-check ${selected ? 'text-orange-500' : 'text-white/10'}`}></i>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [disks, setDisks] = useState([]);
            const [selectedDisk, setSelectedDisk] = useState(null);
            const [loading, setLoading] = useState(true);
            const [installing, setInstalling] = useState(false);
            const [status, setStatus] = useState("");

            useEffect(() => {
                fetch('/api/disks')
                    .then(res => res.json())
                    .then(data => {
                        setDisks(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            }, []);

            const startInstall = () => {
                if (!selectedDisk) return;
                setInstalling(true);
                setStatus("Wiping disk and creating ZFS pool...");

                fetch('/api/install', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ disk: selectedDisk.name })
                })
                .then(res => {
                    if (res.ok) {
                        setStatus("Installation started successfully! Watch logs on the terminal.");
                    } else {
                        setStatus("Failed to start installation.");
                    }
                })
                .catch(err => {
                    setStatus("Error connecting to backend.");
                    console.error(err);
                });
            };

            return (
                <div class="max-w-4xl mx-auto w-full p-4 md:p-8 flex flex-col h-full">
                    <header class="mb-8 flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-orange-600 rounded-full flex items-center justify-center text-white shadow-[0_0_15px_rgba(233,84,32,0.4)]">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-8 h-8 fill-current">
                                    <path d="M26.5 13.5c-1.381 0-2.5 1.119-2.5 2.5s1.119 2.5 2.5 2.5 2.5-1.119 2.5-2.5-1.119-2.5-2.5-2.5zm-21 0c-1.381 0-2.5 1.119-2.5 2.5s1.119 2.5 2.5 2.5 2.5-1.119 2.5-2.5-1.119-2.5-2.5-2.5zm10.5-10.5c-1.381 0-2.5 1.119-2.5 2.5s1.119 2.5 2.5 2.5 2.5-1.119 2.5-2.5-1.119-2.5-2.5-2.5zm0 21c-1.381 0-2.5 1.119-2.5 2.5s1.119 2.5 2.5 2.5 2.5-1.119 2.5-2.5-1.119-2.5-2.5-2.5zM16 8c-4.418 0-8 3.582-8 8s3.582 8 8 8 8-3.582 8-8-3.582-8-8-8zm0 14c-3.314 0-6-2.686-6-6s2.686-6 6-6 6 2.686 6 6-2.686 6-6 6z"/>
                                </svg>
                            </div>
                            <h1 class="text-2xl font-bold tracking-tight">Installation Setup</h1>
                        </div>
                        {installing && (
                            <div class="flex items-center space-x-2 text-orange-500 font-bold">
                                <i class="fa-solid fa-spinner fa-spin"></i>
                                <span>Installing...</span>
                            </div>
                        )}
                    </header>

                    <div class="bg-black/30 backdrop-blur-md rounded-2xl p-6 border border-white/10 shadow-2xl flex-grow overflow-hidden flex flex-col">
                        <div class="mb-6">
                            <h2 class="text-xl font-medium mb-1">Select Disk for ZFS Installation</h2>
                            <p class="text-white/60 text-sm">Target disk will be formatted. Data will be lost.</p>
                        </div>

                        {loading ? (
                            <div class="flex-grow flex items-center justify-center">
                                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-orange-500"></i>
                            </div>
                        ) : (
                            <div class="flex-grow overflow-y-auto pr-2 custom-scrollbar">
                                {disks.map(disk => (
                                    <DiskCard 
                                        key={disk.name} 
                                        disk={disk} 
                                        selected={selectedDisk?.name === disk.name}
                                        onSelect={(d) => !installing && setSelectedDisk(d)}
                                    />
                                ))}
                            </div>
                        )}

                        {status && (
                            <div class={`mt-4 p-3 rounded text-center text-sm font-medium ${status.includes("Error") || status.includes("Failed") ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`}>
                                {status}
                            </div>
                        )}

                        <div class="mt-8 pt-6 border-t border-white/10 flex justify-end">
                            <button 
                                onClick={startInstall}
                                disabled={!selectedDisk || installing}
                                className={`px-8 py-3 rounded-full font-bold text-lg transition-all ${
                                    selectedDisk && !installing
                                    ? 'ubuntu-gradient hover:shadow-[0_0_20px_rgba(233,84,32,0.4)] transform hover:-translate-y-0.5' 
                                    : 'bg-white/10 text-white/30 cursor-not-allowed'
                                }`}
                            >
                                {installing ? "Installing..." : "Install Ubuntu on ZFS"}
                            </button>
                        </div>
                    </div>

                    <footer class="mt-8 text-center text-white/40 text-xs">
                        &copy; 2026 Ubuntu ZFS Installer (ZUI) &bull; Designed for Mobile and Desktop
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
